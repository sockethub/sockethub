name: Compliance
on:
    pull_request:

jobs:
    validate-packages:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
            - name: Use Bun latest
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
            - run: bun install --frozen-lockfile
            - name: Validate package configurations
              run: ./scripts/validate-packages.sh

    lint:
        runs-on: ubuntu-latest

        steps:
            - run: sudo chown -R $USER:$USER ${{ github.workspace }}
            - name: Checkout repository
              uses: actions/checkout@v3
            - name: Use Bun latest
              uses: oven-sh/setup-bun@v2.0.1
              with:
                  bun-version: latest
            - run: bun install --frozen-lockfile
            - run: bun run lint

    build:
        runs-on: ubuntu-latest
        needs: [lint]

        steps:
            - run: sudo chown -R $USER:$USER ${{ github.workspace }}
            - name: Checkout repository
              uses: actions/checkout@v3
            - name: Use Bun latest
              uses: oven-sh/setup-bun@v2.0.1
              with:
                  bun-version: latest
            - run: bun install --frozen-lockfile
            - run: bun run build

    test:
        runs-on: ubuntu-latest
        needs: [build]

        steps:
            - run: sudo chown -R $USER:$USER ${{ github.workspace }}
            - name: Checkout repository
              uses: actions/checkout@v3
            - name: Use Bun latest
              uses: oven-sh/setup-bun@v2.0.1
              with:
                  bun-version: latest
            - run: bun install --frozen-lockfile
            - run: bun run build
            - run: bun test

    examples:
        runs-on: ubuntu-latest
        needs: [build]

        steps:
            - run: sudo chown -R $USER:$USER ${{ github.workspace }}
            - name: Checkout repository
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
            - name: Use Bun latest
              uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
              with:
                  bun-version: latest
            - run: bun install --frozen-lockfile
            - run: bun run build
            - run: bun run docker:start:redis
            - run: sleep 5
            - name: Verify Redis is listening
              run: nc -zv localhost 6379
            - name: Examples svelte-check
              run: cd packages/examples && bun run check
            - name: Install Playwright browsers
              run: cd packages/examples && bunx playwright install --with-deps chromium
            - name: Examples smoke tests (sockethub --examples)
              run: cd packages/examples && bun run test:smoke
