name: Test NPM Package

on:
  workflow_dispatch:
    inputs:
      source:
        description: |
          npm — install sockethub@version from the registry (published releases).
          local — build and pack from the checked-out ref (unreleased master/branch code).
        required: true
        type: choice
        options:
          - npm
          - local
        default: npm
      version:
        description: npm version or dist-tag (e.g. latest, alpha, 5.0.0-alpha.12). Ignored when source=local.
        required: false
        default: latest
      ref:
        description: Git ref to checkout (branch, tag, or SHA). Empty = the branch you run this workflow from.
        required: false
        default: ''
      runtime:
        description: Runtime to test (bun, node, both)
        required: false
        default: both
      suite:
        description: Test suite to run (all, redis, process, browser)
        required: false
        default: all
  workflow_call:
    inputs:
      source:
        description: npm (registry install) or local (build and pack checked-out source)
        required: false
        type: string
        default: npm
      version:
        description: npm version or dist-tag (e.g. latest, alpha, 5.0.0-alpha.12). Ignored when source=local.
        required: false
        type: string
        default: latest
      ref:
        description: Git ref to checkout. Empty = caller ref.
        required: false
        type: string
        default: ''
      runtime:
        description: Runtime to test (bun, node, both)
        required: false
        type: string
        default: both
      suite:
        description: Test suite to run (all, redis, process, browser)
        required: false
        type: string
        default: all
  schedule:
    - cron: '0 2 * * *'  # Nightly at 2am UTC

permissions:
  contents: read
  actions: read

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.versions.outputs.versions }}
      suite: ${{ steps.versions.outputs.suite }}
      source: ${{ steps.versions.outputs.source }}
      ref: ${{ steps.versions.outputs.ref }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: latest

      - name: Resolve test matrix
        id: versions
        env:
          INPUT_SOURCE: ${{ inputs.source || github.event.inputs.source || 'npm' }}
          INPUT_VERSION: ${{ inputs.version || github.event.inputs.version || 'latest' }}
          INPUT_SUITE: ${{ inputs.suite || github.event.inputs.suite || 'all' }}
          INPUT_REF: ${{ inputs.ref || github.event.inputs.ref || '' }}
        run: |
          echo "source=${INPUT_SOURCE}" >> $GITHUB_OUTPUT
          echo "ref=${INPUT_REF}" >> $GITHUB_OUTPUT

          if [ "${INPUT_SOURCE}" = "local" ]; then
            echo 'versions=["local"]' >> $GITHUB_OUTPUT
            echo "suite=${INPUT_SUITE}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            echo "versions=$(bun run scripts/resolve-nightly-versions.mjs)" >> $GITHUB_OUTPUT
            echo "suite=all" >> $GITHUB_OUTPUT
          else
            VERSION="$INPUT_VERSION"
            if [[ ! "$VERSION" =~ ^[a-zA-Z0-9.\-]+$ ]]; then
              echo "Error: Invalid version format" >&2
              exit 1
            fi
            echo "versions=[\"${VERSION}\"]" >> $GITHUB_OUTPUT

            SUITE="$INPUT_SUITE"
            if [[ ! "$SUITE" =~ ^(all|redis|process|browser)$ ]]; then
              echo "Error: Invalid suite value" >&2
              exit 1
            fi
            echo "suite=${SUITE}" >> $GITHUB_OUTPUT
          fi

  test-npm-version:
    runs-on: ubuntu-latest
    needs: [setup]

    strategy:
      matrix:
        version: ${{ fromJson(needs.setup.outputs.versions) }}
        runtime: [bun, node]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.setup.outputs.ref || github.ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install dependencies (for test runner)
        run: bun install

      - name: Build packages (integration test dependencies)
        run: bun run build

      - name: Determine runtime
        id: runtime
        env:
          INPUT_RUNTIME: ${{ inputs.runtime || github.event.inputs.runtime || 'both' }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "run_test=true" >> $GITHUB_OUTPUT
          elif [ "$INPUT_RUNTIME" = "both" ]; then
            echo "run_test=true" >> $GITHUB_OUTPUT
          elif [ "$INPUT_RUNTIME" = "${{ matrix.runtime }}" ]; then
            echo "run_test=true" >> $GITHUB_OUTPUT
          else
            echo "run_test=false" >> $GITHUB_OUTPUT
          fi

      - name: Run tests against installed version
        if: steps.runtime.outputs.run_test == 'true'
        run: |
          if [ "${{ needs.setup.outputs.source }}" = "local" ]; then
            bun run scripts/test-installed-version.js \
              --local \
              --runtime ${{ matrix.runtime }} \
              --suite ${{ needs.setup.outputs.suite }}
          else
            bun run scripts/test-installed-version.js \
              ${{ matrix.version }} \
              --runtime ${{ matrix.runtime }} \
              --suite ${{ needs.setup.outputs.suite }}
          fi

      - name: Upload test results
        if: always() && steps.runtime.outputs.run_test == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results-${{ matrix.version }}-${{ matrix.runtime }}
          path: test-results/
          retention-days: 30

      - name: Report status
        if: always() && steps.runtime.outputs.run_test == 'true'
        run: |
          if [ -f test-results/*/summary.json ]; then
            echo "Test Results Summary:"
            cat test-results/*/summary.json
          fi
