name: Test NPM Package

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to checkout (branch, tag, or SHA). Empty = the branch you run this workflow from.
        required: false
        default: ''
      runtime:
        description: Deployment runtime to test (node)
        required: false
        default: node
      suite:
        description: Test suite to run (all, browser)
        required: false
        default: all
  workflow_call:
    inputs:
      ref:
        description: Git ref to checkout. Empty = caller ref.
        required: false
        type: string
        default: ''
      runtime:
        description: Deployment runtime to test (node)
        required: false
        type: string
        default: node
      suite:
        description: Test suite to run (all, browser)
        required: false
        type: string
        default: all

permissions:
  contents: read
  actions: read

env:
  LOCAL_REGISTRY_URL: http://127.0.0.1:4873

jobs:
  test-packaged-current:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # node is the only supported deployment runtime; releases are validated
        # against node. bun remains a dev/build tool (used in the build step
        # below), not a deployment target.
        runtime: [node]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref || github.event.inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Determine runtime
        id: runtime
        env:
          INPUT_RUNTIME: ${{ inputs.runtime || github.event.inputs.runtime || 'node' }}
          MATRIX_RUNTIME: ${{ matrix.runtime }}
        run: |
          # node is the only matrix runtime; run when it matches (default 'node').
          if [ "$INPUT_RUNTIME" = "$MATRIX_RUNTIME" ]; then
            echo "run_test=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_test=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate suite
        if: steps.runtime.outputs.run_test == 'true'
        env:
          INPUT_SUITE: ${{ inputs.suite || github.event.inputs.suite || 'all' }}
        run: |
          if [[ ! "$INPUT_SUITE" =~ ^(all|browser)$ ]]; then
            echo "Error: Invalid suite value" >&2
            exit 1
          fi

      - name: Install dependencies
        if: steps.runtime.outputs.run_test == 'true'
        run: bun install

      - name: Build packages
        if: steps.runtime.outputs.run_test == 'true'
        run: bun run build

      - name: Start local npm registry
        if: steps.runtime.outputs.run_test == 'true'
        run: |
          REGISTRY_DIR="$RUNNER_TEMP/verdaccio"
          mkdir -p "$REGISTRY_DIR"
          cp scripts/test-installed-version/verdaccio.yaml "$REGISTRY_DIR/config.yaml"

          bunx verdaccio \
            --config "$REGISTRY_DIR/config.yaml" \
            --listen 127.0.0.1:4873 \
            > "$REGISTRY_DIR/verdaccio.log" 2>&1 &
          echo "$!" > "$REGISTRY_DIR/pid"

          for attempt in {1..30}; do
            if curl -fsS "$LOCAL_REGISTRY_URL/-/ping" >/dev/null; then
              echo "Local registry is ready"
              exit 0
            fi
            sleep 1
          done

          echo "Local registry failed to start" >&2
          cat "$REGISTRY_DIR/verdaccio.log" >&2
          exit 1

      - name: Publish packages to local registry
        if: steps.runtime.outputs.run_test == 'true'
        env:
          NPM_CONFIG_REGISTRY: ${{ env.LOCAL_REGISTRY_URL }}
        run: |
          bunx lerna publish from-package \
            --registry "$LOCAL_REGISTRY_URL" \
            --dist-tag local \
            --yes \
            --no-git-tag-version \
            --no-push \
            --ignore-scripts

      - name: Resolve package version
        if: steps.runtime.outputs.run_test == 'true'
        id: package
        run: |
          VERSION=$(node -p "require('./packages/sockethub/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Testing packaged sockethub@$VERSION"

      - name: Run tests against locally published package
        if: steps.runtime.outputs.run_test == 'true'
        env:
          MATRIX_RUNTIME: ${{ matrix.runtime }}
          SETUP_SUITE: ${{ inputs.suite || github.event.inputs.suite || 'all' }}
        run: |
          bun run scripts/test-installed-version.js \
            "${{ steps.package.outputs.version }}" \
            --registry "$LOCAL_REGISTRY_URL" \
            --runtime "$MATRIX_RUNTIME" \
            --suite "$SETUP_SUITE"

      - name: Upload test results
        if: always() && steps.runtime.outputs.run_test == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results-local-${{ matrix.runtime }}
          path: test-results/
          retention-days: 30

      - name: Report status
        if: always() && steps.runtime.outputs.run_test == 'true'
        run: |
          if [ -f test-results/*/summary.json ]; then
            echo "Test Results Summary:"
            cat test-results/*/summary.json
          fi

      - name: Stop local npm registry
        if: always() && steps.runtime.outputs.run_test == 'true'
        run: |
          PID_FILE="$RUNNER_TEMP/verdaccio/pid"
          if [ -f "$PID_FILE" ]; then
            kill "$(cat "$PID_FILE")" 2>/dev/null || true
          fi
