name: Integration
on:
  pull_request:
  schedule:
    - cron: '0 3 * * *'  # Nightly at 3am UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.resolve.outputs.targets }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: 1.2.4

      - name: Resolve test targets
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "targets=$(bun run scripts/resolve-nightly-integration-refs.mjs)" >> $GITHUB_OUTPUT
          else
            echo 'targets=[{"name":"pr","ref":""}]' >> $GITHUB_OUTPUT
          fi

  packages:
    name: packages (${{ matrix.target.name }})
    runs-on: ubuntu-latest
    needs: [setup]
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.setup.outputs.targets) }}

    steps:
      - run: sudo chown -R $USER:$USER ${{ github.workspace }}
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ matrix.target.ref != '' && matrix.target.ref || github.ref }}
          persist-credentials: false
      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: 1.2.4
      - run: bun install
      - run: bun run build

      - run: bun run docker:start:redis
      - run: sleep 5

      - name: Verify Redis is listening
        run: nc -zv localhost 6379

      - name: Package Integration Tests
        run: bun run integration:packages

  process:
    name: process (${{ matrix.target.name }})
    runs-on: ubuntu-latest
    needs: [setup]
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.setup.outputs.targets) }}

    steps:
      - run: sudo chown -R $USER:$USER ${{ github.workspace }}
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ matrix.target.ref != '' && matrix.target.ref || github.ref }}
          persist-credentials: false
      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: 1.2.4
      - run: bun install
      - run: bun run build

      - run: bun run docker:start:redis
      - run: bun run docker:start:xmpp
      - run: bun run docker:start:irc
      - run: sleep 5

      - name: Verify Redis is listening
        run: nc -zv localhost 6379

      - name: Verify XMPP is listening
        run: nc -zv localhost 5222

      - name: Verify IRC is listening
        run: nc -zv localhost 6667

      - name: Verifying Child Process Termination
        run: VERBOSE=true bun run integration:process

      - name: Rate Limiter Integration Tests
        run: bun run integration:rate-limiter

      - name: View running processes
        if: always()
        run: ps ax | grep sockethub

  browser:
    name: browser (${{ matrix.target.name }})
    runs-on: ubuntu-latest
    needs: [setup]
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.setup.outputs.targets) }}

    steps:
      - run: sudo chown -R $USER:$USER ${{ github.workspace }}
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ matrix.target.ref != '' && matrix.target.ref || github.ref }}
          persist-credentials: false
      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: 1.2.4
      - run: bun install
      - run: bun run build

      - run: docker compose build --build-arg bun_version=1.2.4 --build-arg LOG_LEVEL=debug

      - name: Pre-pull external images (with retry)
        run: bash scripts/docker-compose-retry.sh pull prosody ergo mock-oauth redis

      - run: bun run docker:start
      - run: sleep 5

      - name: Verify Sockethub is listening externally
        run: nc -zv localhost 10550

      - name: Verify Redis is listening
        run: nc -zv localhost 6379

      - name: Verify XMPP is listening
        run: nc -zv localhost 5222

      - name: Verify IRC is listening
        run: nc -zv localhost 6667

      - name: Verify Sockethub serves client files
        run: |
          curl -f http://localhost:10550/socket.io.js > /dev/null
          curl -f http://localhost:10550/sockethub-client.js > /dev/null

      - name: Basic Browser Integration Tests
        run: XMPP_HOST=prosody bun run integration:browser:basic

      - name: Platform Response Contract Tests
        run: XMPP_HOST=prosody bun run integration:browser:contract

      - name: Sockethub Logs - Basic
        if: always()
        continue-on-error: true
        run: docker logs sockethub-sockethub-1

      - run: echo "START_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV

      - name: Multiclient XMPP Integration Tests
        run: XMPP_HOST=prosody bun run integration:browser:multiclient

      - name: Sockethub Logs - Multiclient
        if: always()
        continue-on-error: true
        run: docker logs --since "${{ env.START_TIME }}" sockethub-sockethub-1

      - run: echo "START_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV

      - name: Reconnection XMPP Integration Tests
        run: XMPP_HOST=prosody bun run integration:browser:reconnection

      - name: Sockethub Logs - Reconnection
        if: always()
        continue-on-error: true
        run: docker logs --since "${{ env.START_TIME }}" sockethub-sockethub-1

      - run: echo "START_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV

      - name: Resource Clash XMPP Integration Tests
        run: XMPP_HOST=prosody bun run integration:browser:resourceclash

      - name: Sockethub Logs - Resource Clash
        if: always()
        continue-on-error: true
        run: docker logs --since "${{ env.START_TIME }}" sockethub-sockethub-1

      - run: echo "START_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV

      - name: Basic IRC Integration Tests
        run: IRC_HOST=ergo bun run integration:browser:irc-basic

      - name: Sockethub Logs - IRC Basic
        if: always()
        continue-on-error: true
        run: docker logs --since "${{ env.START_TIME }}" sockethub-sockethub-1

      - name: Ergo Logs - IRC Basic
        if: always()
        continue-on-error: true
        run: docker logs --since "${{ env.START_TIME }}" sockethub-ergo-1

      - run: echo "START_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV

      - name: Multiclient IRC Integration Tests
        run: IRC_HOST=ergo bun run integration:browser:irc-multiclient

      - name: Sockethub Logs - IRC Multiclient
        if: always()
        continue-on-error: true
        run: docker logs --since "${{ env.START_TIME }}" sockethub-sockethub-1

      - name: Ergo Logs - IRC Multiclient
        if: always()
        continue-on-error: true
        run: docker logs --since "${{ env.START_TIME }}" sockethub-ergo-1

      - run: echo "START_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV

      - name: Reconnection IRC Integration Tests
        run: IRC_HOST=ergo bun run integration:browser:irc-reconnection

      - name: Sockethub Logs - IRC Reconnection
        if: always()
        continue-on-error: true
        run: docker logs --since "${{ env.START_TIME }}" sockethub-sockethub-1

      - name: Ergo Logs - IRC Reconnection
        if: always()
        continue-on-error: true
        run: docker logs --since "${{ env.START_TIME }}" sockethub-ergo-1

      - run: echo "START_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV

      - name: Nick Clash IRC Integration Tests
        run: IRC_HOST=ergo bun run integration:browser:irc-nickclash

      - name: Sockethub Logs - IRC Nick Clash
        if: always()
        continue-on-error: true
        run: docker logs --since "${{ env.START_TIME }}" sockethub-sockethub-1

      - name: Ergo Logs - IRC Nick Clash
        if: always()
        continue-on-error: true
        run: docker logs --since "${{ env.START_TIME }}" sockethub-ergo-1
