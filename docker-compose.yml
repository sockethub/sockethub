services:
    sockethub:
        build:
            context: .
            target: prod
        environment:
            - REDIS_URL=redis://redis:6379
        ports:
            - "10550:10550"
        networks:
            - sockethub-net
        depends_on:
            - redis
    redis:
        image: redis
        ports:
            - "6379:6379"
        networks:
            - sockethub-net
    prosody:
        image: prosody/prosody:latest
        user: prosody
        ports:
          - "5222:5222"
        volumes:
            - ./integration/prosody:/etc/prosody
        entrypoint: [ "/bin/bash", "/etc/prosody/start.sh" ]
        networks:
            - sockethub-net
    ergo:
        image: ghcr.io/ergochat/ergo:stable
        ports:
            - "6667:6667"
        volumes:
            - ./integration/ergo:/ircd-config:ro
        entrypoint: [ "/bin/sh", "/ircd-config/bootstrap.sh" ]
        networks:
            - sockethub-net
        depends_on:
            - mock-oauth
    mock-oauth:
        image: node:22-alpine
        working_dir: /app
        volumes:
            - ./integration/mock-oauth:/app:ro
        command: [ "node", "server.js" ]
        networks:
            - sockethub-net

networks:
    sockethub-net:
